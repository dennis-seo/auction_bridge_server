name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: auctionbridge-srv
  PROJECT_NUMBER: '925072942431'
  REGION: asia-northeast3
  REPO: auctionbridge
  SERVICE: auctionbridge-api
  RUNTIME_SA: cloud-run-runtime@auctionbridge-srv.iam.gserviceaccount.com
  CRON_SA: cloud-scheduler-cron@auctionbridge-srv.iam.gserviceaccount.com
  WIF_PROVIDER: projects/925072942431/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  DEPLOYER_SA: github-deployer@auctionbridge-srv.iam.gserviceaccount.com

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write     # WIF OIDC 토큰 발급에 필요

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP via Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Generate env.runtime.yaml from secret
        env:
          ENV_PRODUCTION: ${{ secrets.ENV_PRODUCTION }}
        run: |
          set -euo pipefail
          if [ -z "${ENV_PRODUCTION}" ]; then
            echo "::error::Secret ENV_PRODUCTION is empty. Add the full .env.production content as a GitHub secret."
            exit 1
          fi
          printf '%s\n' "${ENV_PRODUCTION}" > .env.production

          mkdir -p deploy
          : > deploy/env.runtime.yaml
          while IFS= read -r line || [ -n "$line" ]; do
            # Skip blank/comment
            stripped="${line%$'\r'}"
            [[ -z "${stripped// }" ]] && continue
            [[ "${stripped# }" == \#* ]] && continue
            # Split on first '='
            key="${stripped%%=*}"
            val="${stripped#*=}"
            key="${key// }"
            # Strip surrounding quotes
            if [[ "$val" =~ ^\"(.*)\"$ ]]; then val="${BASH_REMATCH[1]}"; fi
            if [[ "$val" =~ ^\'(.*)\'$ ]]; then val="${BASH_REMATCH[1]}"; fi
            # YAML escape: backslash and double-quote
            val="${val//\\/\\\\}"
            val="${val//\"/\\\"}"
            printf '%s: "%s"\n' "$key" "$val" >> deploy/env.runtime.yaml
          done < .env.production

          # CRON_SERVICE_ACCOUNT_EMAIL / CRON_AUDIENCE 자동 주입 (없을 때만)
          grep -q '^CRON_SERVICE_ACCOUNT_EMAIL:' deploy/env.runtime.yaml || \
            printf 'CRON_SERVICE_ACCOUNT_EMAIL: "%s"\n' "${CRON_SA}" >> deploy/env.runtime.yaml
          grep -q '^CRON_AUDIENCE:' deploy/env.runtime.yaml || \
            printf 'CRON_AUDIENCE: ""\n' >> deploy/env.runtime.yaml

          echo "Generated keys:"
          awk -F: '{print $1}' deploy/env.runtime.yaml

      - name: Build & push image with Cloud Build
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO}/${SERVICE}:${GITHUB_SHA::12}"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"
          # Regional 빌드 + user-owned 로그 버킷
          # → 기본 Google-owned 버킷 권한 이슈 회피, 로그 스트리밍 가능
          gcloud builds submit \
            --region="$REGION" \
            --default-buckets-behavior=REGIONAL_USER_OWNED_BUCKET \
            --tag "$IMAGE" \
            --project "$PROJECT_ID" \
            .

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$SERVICE" \
            --image "$IMAGE" \
            --region "$REGION" \
            --project "$PROJECT_ID" \
            --service-account "$RUNTIME_SA" \
            --allow-unauthenticated \
            --port 8080 \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 3 \
            --timeout 540 \
            --concurrency 80 \
            --env-vars-file deploy/env.runtime.yaml

      - name: Update CRON_AUDIENCE to service URL
        run: |
          SERVICE_URL=$(gcloud run services describe "$SERVICE" \
              --region "$REGION" --project "$PROJECT_ID" \
              --format="value(status.url)")
          echo "Service URL: $SERVICE_URL"
          gcloud run services update "$SERVICE" \
            --region "$REGION" --project "$PROJECT_ID" \
            --update-env-vars="CRON_AUDIENCE=${SERVICE_URL}" \
            --quiet

      - name: Smoke test /health
        run: |
          SERVICE_URL=$(gcloud run services describe "$SERVICE" \
              --region "$REGION" --project "$PROJECT_ID" \
              --format="value(status.url)")
          echo "Hitting ${SERVICE_URL}/health"
          for i in 1 2 3 4 5; do
            if curl -fsS "${SERVICE_URL}/health"; then
              echo
              echo "✅ Health OK"
              exit 0
            fi
            echo "Attempt $i failed, retrying..."
            sleep 5
          done
          echo "::error::Health check failed"
          exit 1
